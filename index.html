  const TODAY = new Date(2026, 5, 8);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function parseMaturity(s) {
    let m = s.match(/^(\d{1,2})-([A-Za-z]{3})-?(\d{2,4})$/);
    if (m) {
      let [_, d, mon, y] = m;
      y = +y; if (y < 100) y += 2000;
      const mi = MONTHS.findIndex(x => x.toLowerCase() === mon.toLowerCase());
      if (mi < 0) return null;
      return new Date(y, mi, +d);
    }
    m = s.match(/^([A-Za-z]{3})\s+(\d{4})$/);
    if (m) {
      const mi = MONTHS.findIndex(x => x.toLowerCase() === m[1].toLowerCase());
      if (mi < 0) return null;
      return new Date(+m[2], mi, 1);
    }
    return null;
  }

  function tenureFromMaturity(s) {
    const d = parseMaturity(s);
    if (!d) return '—';
    let months = (d.getFullYear() - TODAY.getFullYear()) * 12 + (d.getMonth() - TODAY.getMonth());
    if (d.getDate() < TODAY.getDate()) months -= 1;
    if (months < 0) return 'Matured';
    const y = Math.floor(months / 12);
    const mo = months % 12;
    if (y === 0) return `${mo}Mo`;
    if (mo === 0) return `${y}Yr`;
    return `${y}Yr ${mo}Mo`;
  }

  function mono(name) {
    const stop = new Set(['the','and','of','for','private','pvt','ltd','limited','company','corporation','services','financial','finance','india','corp','co']);
    const words = name.replace(/[^A-Za-z\s]/g, ' ').split(/\s+/).filter(w => w && !stop.has(w.toLowerCase()));
    if (!words.length) return name.slice(0,2).toUpperCase();
    if (words.length === 1) return words[0].slice(0,2).toUpperCase();
    return (words[0][0] + words[1][0]).toUpperCase();
  }

  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function cardHtml(b, idx) {
    const tenure = tenureFromMaturity(b.maturity);
    return `
      <article class="card" data-idx="${idx}" data-cat="${b.cat}" data-freq="${b.freq.toLowerCase()}" data-secured="${b.secured}">
        <div class="card-body">
          <div class="card-head">
            <div class="badge-mono">${esc(mono(b.name))}</div>
            <div class="issuer">
              <div class="issuer-name" title="${esc(b.name)}">${esc(b.name)}</div>
              <div class="issuer-isin">ISIN: <span>${esc(b.isin)}</span></div>
            </div>
            <button class="bookmark" data-act="bookmark" aria-label="Save bond">${ICONS.bookmark}</button>
          </div>
          <div class="pills">
            <span class="pill rating">${esc(b.rating)}</span>
            <span class="pill outline${b.secured ? '' : ' unsecured'}">${b.secured ? ICONS.shield : ICONS.shieldOff} <span>${b.secured ? 'Secured' : 'Unsecured'}</span></span>
            <span class="pill outline">${ICONS.clock} <span>${esc(b.freq)}</span></span>
            <span class="pill outline"><span>${esc(b.principal)}</span></span>
          </div>
          <div class="info">
            <div class="info-cell">
              <div class="info-row">
                <div class="info-label">Coupon Rate</div>
                <div class="info-value"><span>${esc(b.coupon)}</span></div>
              </div>
              <div class="info-row">
                <div class="info-label">Tenure</div>
                <div class="info-value sub">${esc(tenure)}</div>
              </div>
            </div>
            <div class="info-cell right">
              <div class="info-row">
                <div class="info-label">Min. Inv.</div>
                <div class="info-value"><span>${esc(b.minInv)}</span></div>
              </div>
              <div class="info-row">
                <div class="info-label">Maturity</div>
                <div class="info-value sub"><span>${esc(b.maturity)}</span></div>
              </div>
            </div>
          </div>
        </div>
        <div class="card-foot">
          <div class="foot-left">
            <div class="foot-left-stack">
              <div class="foot-left-text">Yield to Maturity <span class="info-i" title="Yield to Maturity">i</span></div>
              <div class="ytm-inline">${esc(b.yield)}</div>
            </div>
          </div>
          <button class="foot-right" data-act="details"><span>View Details</span> ${ICONS.arrow}</button>
        </div>
      </article>`;
  }

  const CATS = [
    { key: 'unlisted', label: 'Unlisted Corporate Bonds' },
    { key: 'listed',   label: 'Listed Corporate Bonds' },
    { key: 'state',    label: 'State Guaranteed Bonds' },
  ];

  const sectionsEl = document.getElementById('sections');

  function renderAll() {
    sectionsEl.innerHTML = CATS.map(cat => {
      const items = BONDS.map((b, i) => ({b, i})).filter(x => x.b.cat === cat.key);
      return `
        <section data-section="${cat.key}">
          <div class="section-head">
            <h2>${cat.label}</h2>
            <span class="count">${items.length}</span>
            <div class="rule"></div>
          </div>
          <div class="grid">
            ${items.map(({b,i}) => cardHtml(b, i)).join('')}
          </div>
        </section>`;
    }).join('');
    document.getElementById('count-all').textContent = BONDS.length;
  }
  renderAll();

  function isSaved(card) { return card.querySelector('.bookmark.on') !== null; }

  let activeFilter = 'all';
  function applyFilter() {
    document.querySelectorAll('section[data-section]').forEach(sec => {
      const cat = sec.dataset.section;
      const cards = sec.querySelectorAll('.card');
      let visible = 0;
      cards.forEach(card => {
        let show = true;
        if (activeFilter === 'unlisted') show = cat === 'unlisted';
        else if (activeFilter === 'listed') show = cat === 'listed';
        else if (activeFilter === 'state') show = cat === 'state';
        else if (activeFilter === 'saved') show = isSaved(card);
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      sec.style.display = visible ? '' : 'none';
    });
  }

  document.getElementById('filters').addEventListener('click', e => {
    const chip = e.target.closest('.chip[data-filter]');
    if (!chip) return;
    document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    applyFilter();
  });

  sectionsEl.addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const actEl = e.target.closest('[data-act]');
    if (!actEl) return;
    if (actEl.dataset.act === 'bookmark') {
      e.stopPropagation();
      actEl.classList.toggle('on');
      showToast(actEl.classList.contains('on') ? 'Saved' : 'Removed from saved');
      if (activeFilter === 'saved') applyFilter();
    }
    if (actEl.dataset.act === 'details') {
      const name = card.querySelector('.issuer-name').textContent;
      showToast(`Opening: ${name}`);
    }
  });

  const toastEl = document.getElementById('toast');
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toastEl.classList.remove('show'), 1700);
  }

  document.getElementById('download-btn').addEventListener('click', () => {
    const clone = document.documentElement.cloneNode(true);
    clone.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
    const allChip = clone.querySelector('.chip[data-filter="all"]');
    if (allChip) allChip.classList.add('active');
    clone.querySelectorAll('.card, section[data-section]').forEach(el => el.style.display = '');
    const html = '<!doctype html>\n<html lang="en">\n' + clone.innerHTML + '\n</html>';
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Finzace_Bond_Quotes_8Jun.html';
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
    showToast('Downloaded successfully');
  });
</script>

</body>
</html>
